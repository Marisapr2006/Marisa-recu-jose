<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MShop - Panel de Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --white: #ffffff;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --border-color: #dcdde1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background-color: var(--primary-color);
            color: white;
            padding-top: 20px;
            position: fixed;
            height: 100%;
        }

        .sidebar-header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-menu {
            list-style: none;
            margin-top: 20px;
        }

        .sidebar-menu li a {
            display: block;
            padding: 15px 25px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border-left: 4px solid var(--accent-color);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 250px;
            flex-grow: 1;
            padding: 30px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-add {
            background-color: var(--success);
            color: white;
        }

        .btn-add:hover {
            background-color: #219150;
        }

        .btn-edit {
            background-color: var(--accent-color);
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .btn-delete {
            background-color: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        /* TABLE STYLES */
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table th,
        table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        table th {
            background-color: #f8f9fa;
            color: var(--primary-color);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .prod-img {
            width: 40px;
            height: 40px;
            background: #eee;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-stock {
            background-color: #e1f5fe;
            color: #039be5;
        }

        .badge-low {
            background-color: #fff3e0;
            color: #ef6c00;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 10px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: var(--primary-color);
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #7f8c8d;
            transition: color 0.2s;
        }

        .btn-close:hover {
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        .form-group input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn-guardar {
            width: 100%;
            padding: 12px;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-guardar:hover {
            background-color: #219150;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }

            .sidebar-header h2,
            .sidebar-menu li a span {
                display: none;
            }

            .main-content {
                margin-left: 70px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>MShop</h2>
            <small>Admin Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="grafico.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a></li>
            <li><a href="#" class="active"><i class="fas fa-box"></i> <span>Productos</span></a></li>
            <li><a href="comentarios.html"><i class="fas fa-comments"></i> <span>Comentarios</span></a></li>
            <li style="margin-top: 50px;"><a href="index.html"><i class="fas fa-arrow-left"></i> <span>Ver Tienda</span></a></li>
            <li><a href="#" id="logoutBoton"><i class="fas fa-sign-out-alt"></i> <span>Cerrar Sesión</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="admin-header">
            <h1>Gestión de Productos</h1>
            <div class="user-info">
                <span>Bienvenido, <strong id="adminNombre">Admin</strong></span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=3498db&color=fff" width="40"
                    style="border-radius: 50%;">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn btn-add" id="btnAnadir"><i class="fas fa-plus"></i> Añadir Nuevo Producto</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitulo">Añadir Producto</h2>
                <button class="btn-close" id="btnCerrarModal"><i class="fas fa-times"></i></button>
            </div>
            <form id="formProducto">
                <input type="hidden" id="inputId">
                <div class="form-group">
                    <label for="inputNombre">Nombre del producto</label>
                    <input type="text" id="inputNombre" placeholder="Ej: Laptop Gaming" required>
                </div>
                <div class="form-group">
                    <label for="inputPrecio">Precio (€)</label>
                    <input type="number" id="inputPrecio" placeholder="Ej: 999.99" step="0.01" min="0" required>
                </div>
                <button type="submit" class="btn-guardar"><i class="fas fa-save"></i> Guardar Producto</button>
            </form>
        </div>
    </div>

    <script type="module">
        import Producto from "./modelos/Producto.js";
        import { obtenerProductos, cargarProductos } from "./js/catalogo.js";
        import { estaAutenticado, obtenerUsuario, logout } from "./js/autenticacion.js";

        if (!estaAutenticado()) {
            window.location.href = 'login.html';
        }

        const usuario = obtenerUsuario();
        document.getElementById('adminNombre').textContent = usuario.nombre;

        await pintarTabla();

        async function pintarTabla() {
            const productos = await obtenerProductos();
            const cuerpoTabla = document.getElementById('cuerpoTabla');

            if (!cuerpoTabla) return false;

            cuerpoTabla.innerHTML = '';

            if (!productos || productos.length === 0) {
                cuerpoTabla.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#7f8c8d;padding:20px;">No hay productos.</td></tr>';
                return false;
            }

            let resultado = '';
            productos.forEach(producto => {
                resultado += `
                    <tr>
                        <td>#${producto.id}</td>
                        <td>
                            <div class="prod-img"><i class="fas fa-laptop"></i></div>
                        </td>
                        <td>${producto.nombre}</td>
                        <td>${producto.precio} €</td>
                        <td>
                            <button class="btn btn-edit" data-id="${producto.id}"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-delete" data-id="${producto.id}"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            cuerpoTabla.innerHTML = resultado;
            return true;
        }

        document.getElementById('btnAnadir').addEventListener('click', () => {
            abrirModal();
        });

        document.getElementById('cuerpoTabla').addEventListener('click', async (e) => {
            const btnEdit = e.target.closest('.btn-edit');
            const btnDelete = e.target.closest('.btn-delete');

            if (btnEdit) {
                const id = Number(btnEdit.dataset.id);
                const productos = await obtenerProductos();
                let producto = null;
                for (let i = 0; i < productos.length; i++) {
                    if (Number(productos[i].id) === id) {
                        producto = productos[i];
                        break;
                    }
                }
                if (producto) abrirModal(producto);
            }

            if (btnDelete) {
                const id = Number(btnDelete.dataset.id);
                if (confirm('¿Estás seguro de que quieres eliminar este producto?')) {
                    await eliminarProducto(id);
                    await pintarTabla();
                }
            }
        });

        async function eliminarProducto(id) {
            const productos = await obtenerProductos();
            const nuevos = [];
            for (let i = 0; i < productos.length; i++) {
                if (Number(productos[i].id) !== id) {
                    nuevos.push(productos[i]);
                }
            }
            await cargarProductos(nuevos);
        }

        function abrirModal(producto = null) {
            const modal = document.getElementById('modal');
            const titulo = document.getElementById('modalTitulo');
            const inputId = document.getElementById('inputId');
            const inputNombre = document.getElementById('inputNombre');
            const inputPrecio = document.getElementById('inputPrecio');

            if (producto) {
                titulo.textContent = 'Editar Producto';
                inputId.value = producto.id;
                inputNombre.value = producto.nombre;
                inputPrecio.value = producto.precio;
            } else {
                titulo.textContent = 'Añadir Producto';
                inputId.value = '';
                inputNombre.value = '';
                inputPrecio.value = '';
            }

            modal.classList.add('active');
        }

        document.getElementById('btnCerrarModal').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('active');
        });

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                document.getElementById('modal').classList.remove('active');
            }
        });

        document.getElementById('formProducto').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('inputId').value;
            const nombre = document.getElementById('inputNombre').value.trim();
            const precio = Number(document.getElementById('inputPrecio').value);

            const productos = await obtenerProductos() || [];

            if (id) {
                for (let i = 0; i < productos.length; i++) {
                    if (Number(productos[i].id) === Number(id)) {
                        productos[i].nombre = nombre;
                        productos[i].precio = precio;
                        break;
                    }
                }
            } else {
                let nuevoId = 1;
                for (let i = 0; i < productos.length; i++) {
                    if (productos[i].id >= nuevoId) {
                        nuevoId = productos[i].id + 1;
                    }
                }
                const nuevo = new Producto(nuevoId, nombre, precio, '');
                productos.push(nuevo);
            }

            await cargarProductos(productos);
            document.getElementById('modal').classList.remove('active');
            await pintarTabla();
        });

        document.getElementById('logoutBoton').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
