<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MShop - Análisis de Precios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background-color: var(--primary-color);
            color: white;
            padding-top: 20px;
            position: fixed;
            height: 100%;
            z-index: 100;
        }

        .sidebar-header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-menu {
            list-style: none;
            margin-top: 20px;
        }

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 25px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar-menu li a:hover, .sidebar-menu li a.active {
            background-color: rgba(255,255,255,0.1);
            color: white;
            border-left: 4px solid var(--accent-color);
        }

        /* MAIN CONTENT AREA */
        .main-content {
            margin-left: 250px; /* Espacio para el sidebar fixed */
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .btn-volver {
            margin-top: 30px;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-volver:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>MShop</h2>
            <small>Admin Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a></li>
            <li><a href="admin.html"><i class="fas fa-box"></i> <span>Productos</span></a></li>
            <li style="margin-top: 50px;"><a href="index.html"><i class="fas fa-arrow-left"></i> <span>Ver Tienda</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <h2>Dashboard: Análisis de Precios</h2>
        <p>Visualización comparativa del valor de los productos en inventario.</p>

        <div class="chart-container">
            <canvas id="graficoProductos"></canvas>
        </div>

        <a href="index.html" class="btn-volver">
            <i class="fas fa-chevron-left"></i> Volver a la tienda
        </a>
    </div>

    <script>
        // 1. Obtener los datos del LocalStorage
        const productosGuardados = JSON.parse(localStorage.getItem('productos')) || [];

        // 2. Preparar los datos
        const etiquetas = productosGuardados.map(p => p.nombre || 'Sin nombre');
        const precios = productosGuardados.map(p => p.precio || 0);

        // 3. Renderizar el gráfico
        const ctx = document.getElementById('graficoProductos').getContext('2d');
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: etiquetas,
                datasets: [{
                    label: 'Precio en Euros (€)',
                    data: precios,
                    backgroundColor: 'rgba(52, 152, 219, 0.6)',
                    borderColor: 'rgba(52, 152, 219, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) { return value + ' €'; }
                        }
                    }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    </script>
</body>
</html>
